<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace">
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="760" height="430" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="760" height="430" fill="#0d1117"/>
    <rect x="0" y="0" width="760" height="430" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- title bar -->
    <rect x="0" y="0" width="760" height="36" fill="#161b22"/>
    <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="18" r="6" fill="#27c93f"/>
    <text x="380" y="23" fill="#8b949e" font-size="13" text-anchor="middle">san@github: ~</text>

    <!-- body -->
    <g font-size="15" fill="#c9d1d9">
      <text x="24" y="68"><tspan fill="#7ee787">san@github</tspan><tspan fill="#8b949e">:~$ </tspan><tspan fill="#c9d1d9">whoami</tspan></text>
      <text x="24" y="94" fill="#79c0ff">San</text>

      <text x="24" y="132"><tspan fill="#7ee787">san@github</tspan><tspan fill="#8b949e">:~$ </tspan><tspan fill="#c9d1d9">cat interests.txt</tspan></text>
      <text x="24" y="158" fill="#e6edf3">AI · Assembly · Linux · Computer Vision</text>
      <text x="24" y="180" fill="#e6edf3">Automation · Network · Microprocessors</text>

      <text x="24" y="218"><tspan fill="#7ee787">san@github</tspan><tspan fill="#8b949e">:~$ </tspan><tspan fill="#c9d1d9">echo $</tspan><tspan fill="#d2a8ff">CURRENT_PROJECT</tspan></text>
      <text x="24" y="244" fill="#79c0ff">Saiko</text>

      <text x="24" y="282"><tspan fill="#7ee787">san@github</tspan><tspan fill="#8b949e">:~$ </tspan><tspan fill="#c9d1d9">cat currently_learning.txt</tspan></text>
      <text x="24" y="308" fill="#e6edf3">NASM · Computer Vision · CUDA</text>
      <text x="24" y="330" fill="#e6edf3">LLMs · Cybersecurity</text>

      <text x="24" y="368"><tspan fill="#7ee787">san@github</tspan><tspan fill="#8b949e">:~$ </tspan><tspan fill="#c9d1d9">./future.sh</tspan></text>
      <text x="24" y="394" fill="#ffa657">Building things that matter...</text>

      <rect x="24" y="404" width="10" height="16" fill="#7ee787">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
