name: generate snake animation

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:         # allows manual trigger from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: santa67creator
          file: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate pinned project cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 generate_card.py "santa67creator" "santa67creator/santa67creator" > pinned-projects.svg
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "Update generated profile assets"
            git push
          else
            echo "No changes to commit."
          fi
